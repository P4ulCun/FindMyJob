name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # necesar pentru push către ghcr.io

jobs:
  # ───────────────────────── CI · BACKEND ─────────────────────────
  backend-ci:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: findmyjob_db
          POSTGRES_USER: findmyjob_user
          POSTGRES_PASSWORD: findmyjob_secret_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U findmyjob_user -d findmyjob_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DB: findmyjob_db
      POSTGRES_USER: findmyjob_user
      POSTGRES_PASSWORD: findmyjob_secret_password
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: "False"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (flake8)
        working-directory: backend
        run: flake8 app

      - name: Run tests (pytest)
        working-directory: backend/app
        run: pytest -ra -m "not llm_eval"

  # ───────────────────────── CI · FRONTEND ────────────────────────
  frontend-ci:
    name: Frontend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests (Vitest)
        run: npm run test:run

  # ─────────────────── CI · DOCKER SANITY BUILD ───────────────────
  docker-build-check:
    name: docker compose build
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]   # rulează doar dacă ambele CI au trecut
    steps:
      - uses: actions/checkout@v4

      # docker-compose.yml referă `env_file: .env`, care e gitignored.
      # Fără el, `docker compose build` eșuează la parsare → îl recreăm aici.
      - name: Create .env for compose
        run: |
          cat > .env <<'EOF'
          POSTGRES_DB=findmyjob_db
          POSTGRES_USER=findmyjob_user
          POSTGRES_PASSWORD=findmyjob_secret_password
          DJANGO_SECRET_KEY=ci-build-key
          DJANGO_DEBUG=False
          EOF

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build

  # ───────────────────────── CD · DEPLOY ──────────────────────────
  deploy:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [docker-build-check]
    # rulează DOAR pe push în main, nu pe Pull Request
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr cere nume de imagine lowercase, iar "P4ulCun/FindMyJob" are majuscule
      - name: Compute lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: prod 
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: prod 
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend