[pytest]
DJANGO_SETTINGS_MODULE = config.settings
pythonpath = .
python_files = test_*.py tests.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q --reuse-db
testpaths = users preferences cv jobs
markers =
    llm_eval: runs the real LLM model (slow, opt-in — use: pytest -m llm_eval)